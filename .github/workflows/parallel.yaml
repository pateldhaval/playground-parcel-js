name: parallel-workflow

on:
  workflow_dispatch:

jobs:
  parallel-job-1:
    runs-on: ubuntu-latest
    steps:
      - name: job-1-step-1
        run: echo "Job 1 > Step 1"
      - name: job-1-step-2
        run: echo "Job 1 > Step 2"
      - name: job-1-step-3
        run: echo "Job 1 > Step 3"

  parallel-job-2:
    runs-on: ubuntu-latest
    steps:
      - name: job-2-step-1
        run: print("Job 2 > Step 1")
        shell: python
