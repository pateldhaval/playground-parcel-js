name: Deploy to Github Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - .github/workflows/*

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true
      - name: Print versions
        run: |
          echo Node
          node --version
          echo PNPM
          pnpm --version
      - name: Install dependencies
        run: pnpm ci
      - name: Execute testing
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true
      - name: Install dependencies
        run: pnpm ci
      - name: Build
        run: pnpm build
      - name: Upload static files as artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write # Required for deploying to GitHub Pages
      id-token: write # Fixes the ACTIONS_ID_TOKEN_REQUEST_URL error
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4
