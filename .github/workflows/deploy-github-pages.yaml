name: Deploy to Github Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - .github/workflows/*

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true
      - name: Print versions
        run: |
          echo Node
          node --version
          echo PNPM
          pnpm --version
      - name: Install dependencies
        run: pnpm ci
      - name: Execute testing
        run: pnpm test
